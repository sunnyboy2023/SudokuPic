<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Cleaner AI</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        canvas { image-rendering: crisp-edges; max-width: 100%; height: auto; }
        .grid-overlay { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); }
        .cell-overlay { border: 1px solid transparent; cursor: pointer; }
        .cell-overlay:hover { border-color: #10b981; background-color: rgba(16, 185, 129, 0.1); }
        .cell-selected { background-color: rgba(16, 185, 129, 0.2); border-color: #059669; z-index: 10; }
    </style>
</head>
<body class="bg-[#F5F5F0] text-[#141414]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useLayoutEffect } = React;

        // Simple Icon Components
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>',
                Eraser: '<path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l4.4 4.4c1 1 1 2.5 0 3.4L7 21Z"/><path d="m22 21-10-10"/><path d="m18 11-4-4"/>',
                Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
                Loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>',
                ImageIcon: '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
                Grid3X3: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/>'
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                    dangerouslySetInnerHTML={{ __html: icons[name] || "" }}
                />
            );
        };

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showKeyInput, setShowKeyInput] = useState(!apiKey);
            const [image, setImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [grid, setGrid] = useState(null);
            const [error, setError] = useState(null);
            const [selectedCell, setSelectedCell] = useState(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            const saveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem('gemini_api_key', apiKey);
                setShowKeyInput(false);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target?.result);
                        setGrid(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleCellClick = (row, col) => {
                setSelectedCell({ row, col });
            };

            const updateCellValue = (value) => {
                if (!selectedCell || !grid) return;
                const newGrid = grid.map((r, ri) => 
                    ri === selectedCell.row ? r.map((c, ci) => ci === selectedCell.col ? value : c) : r
                );
                setGrid(newGrid);
                setSelectedCell(null);
            };

            const processImage = async () => {
                if (!image || !apiKey) return;

                setIsProcessing(true);
                setError(null);
                setGrid(null);
                setSelectedCell(null);

                try {
                    // Load the latest SDK
                    const { GoogleGenAI } = await import("https://esm.run/@google/genai");
                    
                    // Correct initialization for the new SDK
                    const ai = new GoogleGenAI({ apiKey: apiKey });
                    
                    const base64Data = image.split(',')[1];
                    const prompt = `
                        Analyze this image which contains a Sudoku puzzle (likely from a newspaper).
                        TASK:
                        1. Locate the 9x9 Sudoku grid.
                        2. Extract ONLY the original BOLD PRINTED numbers.
                        3. Ignore all handwritten numbers, scribbles, or marker highlights.
                        4. Return the result as a JSON object with a "grid" property containing a 9x9 2D array.
                        Use null for empty cells.
                        Example format: {"grid": [[5,3,null,...], [6,null,null,...], ...]}
                    `;

                    // Use the recommended model and correct method call
                    const response = await ai.models.generateContent({
                        model: "gemini-3-flash-preview",
                        contents: [{
                            parts: [
                                { text: prompt },
                                {
                                    inlineData: {
                                        mimeType: "image/png",
                                        data: base64Data,
                                    },
                                },
                            ]
                        }],
                        config: {
                            responseMimeType: "application/json"
                        }
                    });

                    const text = response.text;
                    if (!text) throw new Error("No response from AI.");
                    
                    const parsed = JSON.parse(text);
                    
                    if (parsed.grid && Array.isArray(parsed.grid)) {
                        setGrid(parsed.grid);
                    } else {
                        throw new Error("Invalid grid format received from AI.");
                    }
                } catch (err) {
                    console.error("Full Error:", err);
                    let message = "Failed to process image.";
                    if (err.message?.includes("API_KEY_INVALID")) {
                        message = "Invalid API Key. Please check your key.";
                    } else if (err.message?.includes("model not found")) {
                        message = "Model error. Please try again later.";
                    } else {
                        message = `Error: ${err.message || "Unknown error"}`;
                    }
                    setError(message);
                } finally {
                    setIsProcessing(false);
                }
            };

            useLayoutEffect(() => {
                if (grid && canvasRef.current) {
                    drawSudoku(grid);
                }
            }, [grid]);

            const drawSudoku = (sudokuGrid) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 1200;
                const cellSize = size / 9;
                canvas.width = size;
                canvas.height = size;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);
                ctx.strokeStyle = '#000000';
                for (let i = 0; i <= 9; i++) {
                    ctx.lineWidth = i % 3 === 0 ? 8 : 2;
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, size); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize); ctx.lineTo(size, i * cellSize); ctx.stroke();
                }
                ctx.fillStyle = '#000000';
                ctx.font = `bold ${cellSize * 0.6}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                sudokuGrid.forEach((row, rowIndex) => {
                    row.forEach((num, colIndex) => {
                        if (num !== null) {
                            ctx.fillText(num.toString(), colIndex * cellSize + cellSize / 2, rowIndex * cellSize + cellSize / 2 + (cellSize * 0.05));
                        }
                    });
                });
            };

            const downloadImage = () => {
                if (!grid || !canvasRef.current) return;
                drawSudoku(grid);
                const link = document.createElement('a');
                link.download = 'cleaned-sudoku.png';
                link.href = canvasRef.current.toDataURL('image/png', 1.0);
                link.click();
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        {/* API Key Modal */}
                        {showKeyInput && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full">
                                    <h2 className="text-2xl font-serif italic mb-4">API Key Required</h2>
                                    <p className="text-stone-500 text-sm mb-6">To use this app on GitHub Pages, you need a Gemini API Key from <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-emerald-600 underline">Google AI Studio</a>.</p>
                                    <form onSubmit={saveApiKey} className="space-y-4">
                                        <input 
                                            type="password" 
                                            value={apiKey} 
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="Enter your API Key"
                                            className="w-full p-4 bg-stone-100 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                            required
                                        />
                                        <button type="submit" className="w-full py-4 bg-[#141414] text-white rounded-xl font-bold hover:bg-emerald-600 transition-colors">Start Using App</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        <header className="mb-12 text-center">
                            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-100 text-emerald-800 text-xs font-semibold uppercase tracking-wider mb-4">
                                <Icon name="Eraser" size={14} />
                                Sudoku Cleaner AI
                            </div>
                            <h1 className="text-4xl md:text-6xl font-serif italic mb-4">Clean Your Puzzle</h1>
                            <div className="flex items-center justify-center gap-4 text-xs text-stone-400">
                                <button onClick={() => setShowKeyInput(true)} className="hover:text-emerald-600 underline">Change API Key</button>
                                <span>v1.1</span>
                            </div>
                        </header>

                        <main className="grid md:grid-cols-2 gap-8 items-start">
                            <section className="space-y-6">
                                <div 
                                    className={`relative aspect-square rounded-3xl border-2 border-dashed transition-all duration-300 flex flex-col items-center justify-center overflow-hidden group cursor-pointer
                                        ${image ? 'border-transparent bg-white shadow-xl' : 'border-stone-300 hover:border-emerald-500 bg-stone-50'}`}
                                    onClick={() => !isProcessing && fileInputRef.current?.click()}
                                >
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                                    {image ? (
                                        <img src={image} className="w-full h-full object-contain p-4" />
                                    ) : (
                                        <div className="text-center p-8">
                                            <Icon name="Upload" size={32} className="mx-auto mb-4 text-stone-300" />
                                            <p className="font-medium text-stone-600">Upload Sudoku Photo</p>
                                        </div>
                                    )}
                                    {isProcessing && (
                                        <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                                            <Icon name="Loader2" size={32} className="text-emerald-600 mb-4" />
                                            <p className="font-medium">AI is cleaning...</p>
                                        </div>
                                    )}
                                </div>
                                <button
                                    onClick={processImage}
                                    disabled={!image || isProcessing}
                                    className={`w-full py-4 rounded-2xl font-semibold text-lg transition-all flex items-center justify-center gap-2
                                        ${!image || isProcessing ? 'bg-stone-200 text-stone-400' : 'bg-[#141414] text-white hover:bg-emerald-600 shadow-lg'}`}
                                >
                                    {isProcessing ? 'Processing...' : 'Clean Puzzle'}
                                </button>
                                {error && <p className="text-red-500 text-sm text-center bg-red-50 p-3 rounded-xl border border-red-100">{error}</p>}
                            </section>

                            <section className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-xl border border-stone-100 min-h-[400px] flex flex-col relative">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="font-serif text-xl italic flex items-center gap-2">
                                            <Icon name="Grid3X3" size={20} className="text-emerald-600" />
                                            Result
                                        </h2>
                                    </div>
                                    <div className="flex-grow flex items-center justify-center bg-stone-50 rounded-2xl border border-stone-100 overflow-hidden relative">
                                        {grid ? (
                                            <div className="relative w-full h-full flex items-center justify-center p-4">
                                                <div className="relative">
                                                    <canvas ref={canvasRef} className="max-w-full max-h-full shadow-2xl" />
                                                    <div className="grid-overlay">
                                                        {grid.map((row, ri) => row.map((_, ci) => (
                                                            <div 
                                                                key={`${ri}-${ci}`}
                                                                onClick={() => handleCellClick(ri, ci)}
                                                                className={`cell-overlay ${selectedCell?.row === ri && selectedCell?.col === ci ? 'cell-selected' : ''}`}
                                                            />
                                                        )))}
                                                    </div>
                                                </div>
                                                {selectedCell && (
                                                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white shadow-2xl rounded-2xl p-3 border border-stone-200 z-20">
                                                        <div className="grid grid-cols-5 gap-2">
                                                            {[1,2,3,4,5,6,7,8,9].map(num => (
                                                                <button key={num} onClick={() => updateCellValue(num)} className="w-10 h-10 rounded-lg bg-stone-100 hover:bg-emerald-500 hover:text-white font-bold">{num}</button>
                                                            ))}
                                                            <button onClick={() => updateCellValue(null)} className="w-10 h-10 rounded-lg bg-red-50 text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center"><Icon name="Eraser" size={16} /></button>
                                                        </div>
                                                        <button onClick={() => setSelectedCell(null)} className="w-full mt-2 text-[10px] uppercase font-bold text-stone-400">Cancel</button>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="text-center text-stone-300">
                                                <Icon name="Grid3X3" size={48} className="mx-auto mb-4 opacity-20" />
                                                <p>Cleaned grid will appear here</p>
                                            </div>
                                        )}
                                    </div>
                                    {grid && (
                                        <button onClick={downloadImage} className="mt-6 w-full py-3 bg-emerald-600 text-white rounded-xl font-medium hover:bg-emerald-700 transition-colors flex items-center justify-center gap-2">
                                            <Icon name="Download" size={18} />
                                            Download PNG
                                        </button>
                                    )}
                                </div>
                            </section>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
